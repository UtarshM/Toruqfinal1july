version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_NAME=happyh50_vehicleinsurance
      - DB_USER=happyh50_vehicleinsurance
      - DB_PASS=xSO1eqNT6FKzhs
    depends_on:
      - db

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=happyh50_vehicleinsurance
      - MYSQL_USER=happyh50_vehicleinsurance
      - MYSQL_PASSWORD=xSO1eqNT6FKzhs
      - MYSQL_ROOT_PASSWORD=rootpassword
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/happyh50_vehicleinsurance.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  mysql_data:
